<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;background:var(--bg-elevated);font-family:var(--font-body);color:var(--text-primary)}
  .wrap{padding:24px;display:flex;flex-direction:column;gap:22px}
  .row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .grp{display:flex;flex-direction:column;gap:10px}
  .lbl{font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-tertiary)}
  .panel{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-lg);padding:10px 16px;max-width:360px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Switch, Badge, ListRow } = window.PvPeekDesignSystem_53b813;
function Demo(){
  const [a,setA]=React.useState(true);
  const [b,setB]=React.useState(false);
  return (
    <div className="wrap">
      <div className="grp">
        <div className="lbl">Button · variants</div>
        <div className="row">
          <Button variant="primary">Start PvPeek</Button>
          <Button variant="secondary">Secondary</Button>
          <Button variant="ghost">Ghost</Button>
          <Button variant="danger">Reset</Button>
          <Button variant="primary" disabled>Disabled</Button>
        </div>
      </div>
      <div className="grp">
        <div className="lbl">Button · sizes</div>
        <div className="row">
          <Button size="sm">Small</Button>
          <Button size="md">Medium</Button>
          <Button size="lg">Large</Button>
        </div>
      </div>
      <div className="row" style={{gap:36,alignItems:'flex-start'}}>
        <div className="grp">
          <div className="lbl">Switch</div>
          <div className="row" style={{gap:18}}>
            <Switch checked={a} onChange={setA} />
            <Switch checked={b} onChange={setB} />
            <Switch checked={true} disabled />
          </div>
        </div>
        <div className="grp">
          <div className="lbl">Badge · tones</div>
          <div className="row">
            <Badge tone="gold">Hundo</Badge>
            <Badge tone="green" solid>PvP</Badge>
            <Badge tone="blue">Lvl 50</Badge>
            <Badge tone="red">XL</Badge>
            <Badge tone="neutral">Shadow</Badge>
          </div>
        </div>
      </div>
      <div className="grp">
        <div className="lbl">ListRow</div>
        <div className="panel">
          <ListRow label="Anonymous analytics" description="No screen data ever leaves your phone." trailing={<Switch checked={a} onChange={setA} />} />
          <ListRow label="Privacy policy" trailing={<span style={{color:'var(--text-tertiary)'}}>↗</span>} onClick={()=>{}} />
          <ListRow label="Version" trailing={<span className="t-num" style={{color:'var(--text-secondary)'}}>1.4.0</span>} divider={false} />
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
