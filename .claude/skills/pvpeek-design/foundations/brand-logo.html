<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-secondary);font-family:var(--font-body)}
  .wrap{padding:20px;display:flex;gap:30px;align-items:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary)}
  .lock{display:flex;align-items:center;gap:12px}
  .word{font-family:var(--font-display);font-size:30px;font-weight:700;letter-spacing:-.01em;color:var(--white)}
  .word .pv{color:var(--gold)}
</style></head>
<body><div class="wrap">
  <div class="cell"><img src="../assets/logo-mark.svg" width="72" height="72"><span class="cap">mark</span></div>
  <div class="cell"><img src="../assets/logo-icon.svg" width="72" height="72"><span class="cap">app icon</span></div>
  <div class="cell"><div class="lock"><img src="../assets/logo-mark.svg" width="46" height="46"><span class="word"><span class="pv">PvP</span>eek</span></div><span class="cap">horizontal lockup</span></div>
</div></body></html>
