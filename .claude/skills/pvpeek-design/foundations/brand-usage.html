<!-- @dsCard group="Brand" viewport="700x170" name="Logo on backgrounds" subtitle="Always on dark slate; keep clearspace = crown height" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);font-family:var(--font-mono)}
  .wrap{padding:18px;display:flex;gap:14px}
  .tile{flex:1;height:120px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .cap{position:absolute;bottom:6px;left:8px;font-size:9px;color:#fff;opacity:.7}
  .ok{position:absolute;top:6px;right:8px;font-size:11px}
</style></head>
<body><div class="wrap">
  <div class="tile" style="background:#15161A;border:1px solid var(--border-subtle)"><img src="../assets/logo-mark.svg" width="56"><span class="cap">slate-900 ✓</span><span class="ok">✓</span></div>
  <div class="tile" style="background:#262B36"><img src="../assets/logo-mark.svg" width="56"><span class="cap">slate-750 ✓</span><span class="ok">✓</span></div>
  <div class="tile" style="background:linear-gradient(135deg,#003893,#CE1126)"><img src="../assets/logo-icon.svg" width="64"><span class="cap">busy bg → use tiled icon</span><span class="ok">✓</span></div>
</div></body></html>
