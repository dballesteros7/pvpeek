<!-- @dsCard group="Colors" viewport="700x160" name="Brand — Colombian heritage" subtitle="Gold, blue, red. Used sparingly for emphasis" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);font-family:var(--font-mono);color:var(--white)}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:18px}
  .col{display:flex;flex-direction:column;gap:8px}
  .head{font-family:var(--font-display);font-size:12px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .chips{display:flex;gap:6px}
  .chip{flex:1;height:54px;border-radius:var(--radius-sm);display:flex;flex-direction:column;justify-content:flex-end;padding:6px;box-sizing:border-box;font-size:8px;font-weight:600}
  .on-dark{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
  .on-gold{color:#1A1405}
</style></head>
<body><div class="grid">
  <div class="col"><div class="head" style="color:var(--gold)">Gold</div><div class="chips">
    <div class="chip on-gold" style="background:#FCD116">FCD116</div>
    <div class="chip on-gold" style="background:#F4C430">F4C430</div>
    <div class="chip on-dark" style="background:#C8920A">C8920A</div>
  </div></div>
  <div class="col"><div class="head" style="color:var(--blue-bright)">Blue</div><div class="chips">
    <div class="chip on-dark" style="background:#5B9DFF">5B9DFF</div>
    <div class="chip on-dark" style="background:#2E6BE6">2E6BE6</div>
    <div class="chip on-dark" style="background:#003893">003893</div>
  </div></div>
  <div class="col"><div class="head" style="color:var(--red-bright)">Red</div><div class="chips">
    <div class="chip on-dark" style="background:#FF4D5E">FF4D5E</div>
    <div class="chip on-dark" style="background:#CE1126">CE1126</div>
  </div></div>
</div></body></html>
