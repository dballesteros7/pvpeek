<!-- @dsCard group="Colors" viewport="700x130" name="Semantic & move colors" subtitle="Status feedback + fast/charged move accents" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);font-family:var(--font-mono);color:var(--white)}
  .row{display:flex;gap:10px;padding:18px;flex-wrap:wrap}
  .chip{display:flex;flex-direction:column;gap:6px;align-items:center}
  .dot{width:64px;height:48px;border-radius:var(--radius-sm)}
  .nm{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-secondary)}
</style></head>
<body><div class="row">
  <div class="chip"><div class="dot" style="background:var(--success)"></div><span class="nm">success</span></div>
  <div class="chip"><div class="dot" style="background:var(--warning)"></div><span class="nm">warning</span></div>
  <div class="chip"><div class="dot" style="background:var(--danger)"></div><span class="nm">danger</span></div>
  <div class="chip"><div class="dot" style="background:var(--info)"></div><span class="nm">info</span></div>
  <div class="chip"><div class="dot" style="background:var(--move-fast)"></div><span class="nm">move · fast</span></div>
  <div class="chip"><div class="dot" style="background:var(--move-charged)"></div><span class="nm">move · charged</span></div>
</div></body></html>
