<!-- @dsCard group="Colors" viewport="700x150" name="Slate base ramp" subtitle="Surfaces & text — deepest floor to white" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);font-family:var(--font-mono);color:var(--text-secondary)}
  .row{display:flex;padding:16px;gap:0}
  .sw{flex:1;height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;box-sizing:border-box}
  .sw b{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:.04em}
  .sw span{font-size:9px;opacity:.7}
  .dark b,.dark span{color:var(--white)}
  .light b,.light span{color:var(--slate-1000)}
</style></head>
<body><div class="row">
  <div class="sw dark" style="background:#0E0F12;border:1px solid var(--border-subtle)"><b>1000</b><span>#0E0F12</span></div>
  <div class="sw dark" style="background:#15161A"><b>900</b><span>#15161A</span></div>
  <div class="sw dark" style="background:#1F222A"><b>800</b><span>#1F222A</span></div>
  <div class="sw dark" style="background:#262B36"><b>750</b><span>#262B36</span></div>
  <div class="sw dark" style="background:#3A424F"><b>600</b><span>#3A424F</span></div>
  <div class="sw dark" style="background:#6B7280"><b>400</b><span>#6B7280</span></div>
  <div class="sw dark" style="background:#9AA3B2"><b>300</b><span>#9AA3B2</span></div>
  <div class="sw light" style="background:#C5CBD6"><b>200</b><span>#C5CBD6</span></div>
  <div class="sw light" style="background:#F7F9FC"><b>white</b><span>#F7F9FC</span></div>
</div></body></html>
