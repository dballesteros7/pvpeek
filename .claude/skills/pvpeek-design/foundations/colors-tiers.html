<!-- @dsCard group="Colors" viewport="700x170" name="Rank-tier scale" subtitle="Percentile → color. The verdict's at-a-glance language" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);font-family:var(--font-body);color:var(--text-secondary)}
  .wrap{padding:18px;display:flex;flex-direction:column;gap:10px}
  .tier{display:flex;align-items:center;gap:12px}
  .bar{width:8px;height:30px;border-radius:2px}
  .name{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:.06em;width:64px}
  .rng{font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);width:80px}
  .desc{font-size:12px;color:var(--text-tertiary)}
</style></head>
<body><div class="wrap">
  <div class="tier"><div class="bar" style="background:var(--tier-perfect);box-shadow:0 0 8px rgba(252,209,22,.5)"></div><span class="name" style="color:var(--tier-perfect)">ELITE</span><span class="rng">≥ 99%</span><span class="desc">Near-perfect / "hundo" — keep it</span></div>
  <div class="tier"><div class="bar" style="background:var(--tier-great)"></div><span class="name" style="color:var(--tier-great)">GREAT</span><span class="rng">95–99%</span><span class="desc">Excellent PvP piece</span></div>
  <div class="tier"><div class="bar" style="background:var(--tier-good)"></div><span class="name" style="color:var(--tier-good)">GOOD</span><span class="rng">88–95%</span><span class="desc">Solid, worth building</span></div>
  <div class="tier"><div class="bar" style="background:var(--tier-fair)"></div><span class="name" style="color:var(--tier-fair)">FAIR</span><span class="rng">75–88%</span><span class="desc">Usable filler</span></div>
  <div class="tier"><div class="bar" style="background:var(--tier-weak)"></div><span class="name" style="color:var(--tier-weak)">WEAK</span><span class="rng">&lt; 75%</span><span class="desc">Transfer candidate</span></div>
</div></body></html>
