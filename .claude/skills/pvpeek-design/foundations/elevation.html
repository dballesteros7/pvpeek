<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Dark-HUD shadows + the overlay float" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-secondary);font-family:var(--font-mono)}
  .wrap{padding:26px 22px;display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;align-items:center;gap:10px}
  .box{width:96px;height:60px;background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:var(--radius-md)}
  .v{font-size:10px}
</style></head>
<body><div class="wrap">
  <div class="cell"><div class="box" style="box-shadow:var(--elev-1)"></div><span class="v">elev-1</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--elev-2)"></div><span class="v">elev-2</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--elev-3)"></div><span class="v">elev-3</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--elev-overlay)"></div><span class="v">overlay</span></div>
  <div class="cell"><div class="box" style="box-shadow:var(--elev-fab),var(--glow-gold)"></div><span class="v">fab + glow</span></div>
</div></body></html>
