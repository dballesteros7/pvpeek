<!-- @dsCard group="Brand" viewport="700x150" name="Iconography — Lucide" subtitle="2px stroke, rounded caps, slate-300 default" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-secondary);font-family:var(--font-mono)}
  .wrap{padding:22px;display:flex;gap:26px;align-items:center;flex-wrap:wrap}
  .i{display:flex;flex-direction:column;align-items:center;gap:8px}
  .i svg{width:26px;height:26px;stroke:var(--text-secondary)}
  .i.acc svg{stroke:var(--gold)}
  .cap{font-size:9px;color:var(--text-tertiary)}
</style></head>
<body><div class="wrap">
  <div class="i acc"><i data-lucide="crown"></i><span class="cap">crown</span></div>
  <div class="i"><i data-lucide="swords"></i><span class="cap">swords</span></div>
  <div class="i"><i data-lucide="eye"></i><span class="cap">peek</span></div>
  <div class="i"><i data-lucide="zap"></i><span class="cap">charged</span></div>
  <div class="i"><i data-lucide="shield"></i><span class="cap">defense</span></div>
  <div class="i"><i data-lucide="scan-line"></i><span class="cap">scan</span></div>
  <div class="i"><i data-lucide="lock"></i><span class="cap">private</span></div>
  <div class="i"><i data-lucide="settings"></i><span class="cap">settings</span></div>
  <div class="i"><i data-lucide="x"></i><span class="cap">dismiss</span></div>
</div>
<script>lucide.createIcons();</script>
</body></html>
