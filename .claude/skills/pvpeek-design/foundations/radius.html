<!-- @dsCard group="Spacing" viewport="700x150" name="Radius" subtitle="Corner rounding tokens" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-secondary);font-family:var(--font-mono)}
  .wrap{padding:20px 22px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;align-items:center;gap:8px}
  .box{width:72px;height:56px;background:var(--surface-raised);border:1px solid var(--border-default)}
  .v{font-size:10px}
</style></head>
<body><div class="wrap">
  <div class="cell"><div class="box" style="border-radius:var(--radius-xs)"></div><span class="v">xs · 6</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-sm)"></div><span class="v">sm · 8</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-md)"></div><span class="v">md · 12</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-lg)"></div><span class="v">lg · 16</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-xl)"></div><span class="v">xl · 22</span></div>
  <div class="cell"><div class="box" style="border-radius:var(--radius-full);width:56px"></div><span class="v">full</span></div>
</div></body></html>
