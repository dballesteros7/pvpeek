<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base grid" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-secondary);font-family:var(--font-mono)}
  .wrap{padding:20px 22px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px}
  .box{background:var(--gold);border-radius:3px}
  .v{font-size:10px}
</style></head>
<body><div class="wrap">
  <div class="cell"><div class="box" style="width:4px;height:4px"></div><span class="v">1·4</span></div>
  <div class="cell"><div class="box" style="width:8px;height:8px"></div><span class="v">2·8</span></div>
  <div class="cell"><div class="box" style="width:12px;height:12px"></div><span class="v">3·12</span></div>
  <div class="cell"><div class="box" style="width:16px;height:16px"></div><span class="v">4·16</span></div>
  <div class="cell"><div class="box" style="width:20px;height:20px"></div><span class="v">5·20</span></div>
  <div class="cell"><div class="box" style="width:24px;height:24px"></div><span class="v">6·24</span></div>
  <div class="cell"><div class="box" style="width:32px;height:32px"></div><span class="v">7·32</span></div>
  <div class="cell"><div class="box" style="width:40px;height:40px"></div><span class="v">8·40</span></div>
  <div class="cell"><div class="box" style="width:48px;height:48px"></div><span class="v">9·48</span></div>
  <div class="cell"><div class="box" style="width:64px;height:64px"></div><span class="v">10·64</span></div>
</div></body></html>
