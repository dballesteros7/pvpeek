<!-- @dsCard group="Type" viewport="700x160" name="Numerics — JetBrains Mono" subtitle="Tabular figures for CP, IVs, ranks, %" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--white);font-family:var(--font-mono);font-variant-numeric:tabular-nums}
  .wrap{padding:20px 22px;display:flex;gap:36px;align-items:flex-end;flex-wrap:wrap}
  .cell{display:flex;flex-direction:column;gap:4px}
  .lab{font-family:var(--font-display);font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-tertiary)}
  .hero{font-size:30px;font-weight:700;line-height:1}
  .stat{font-size:22px;font-weight:700;line-height:1}
  .rank{font-size:16px;font-weight:600}
  .meta{font-family:var(--font-body);font-size:11px;color:var(--text-tertiary);width:100%}
</style></head>
<body><div class="wrap">
  <div class="cell"><span class="lab">CP</span><span class="hero">1,498</span></div>
  <div class="cell"><span class="lab">IV</span><span class="stat" style="color:var(--tier-perfect)">15 / 14 / 13</span></div>
  <div class="cell"><span class="lab">Great</span><span class="rank" style="color:var(--tier-perfect)">#12 · 99.2%</span></div>
  <div class="cell"><span class="lab">Turns</span><span class="rank">3t · ⚡4×</span></div>
  <div class="meta">JetBrains Mono · tabular figures align in columns so numbers never jitter as values change.</div>
</div></body></html>
