<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="Display / heading / body / numeric roles" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;background:var(--bg-app);color:var(--text-primary)}
  .wrap{padding:16px 22px;display:flex;flex-direction:column;gap:9px}
  .r{display:flex;align-items:baseline;gap:14px}
  .tag{font-family:var(--font-mono);font-size:10px;color:var(--text-tertiary);width:96px;flex:0 0 auto}
  .d{font-family:var(--font-display)}
  .b{font-family:var(--font-body)}
</style></head>
<body><div class="wrap">
  <div class="r"><span class="tag">display · 34</span><span class="d" style="font-size:34px;font-weight:700;letter-spacing:-.01em">Verdict</span></div>
  <div class="r"><span class="tag">h1 · 26</span><span class="d" style="font-size:26px;font-weight:700">Screen title</span></div>
  <div class="r"><span class="tag">h2 · 20</span><span class="d" style="font-size:20px;font-weight:600">Section heading</span></div>
  <div class="r"><span class="tag">h3 · 16</span><span class="d" style="font-size:16px;font-weight:600">Row title</span></div>
  <div class="r"><span class="tag">body · 15</span><span class="b" style="font-size:15px">Default body text</span></div>
  <div class="r"><span class="tag">sm · 13</span><span class="b" style="font-size:13px;color:var(--text-secondary)">Secondary text</span></div>
  <div class="r"><span class="tag">xs · 11</span><span class="b" style="font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-tertiary)">Overline label</span></div>
</div></body></html>
