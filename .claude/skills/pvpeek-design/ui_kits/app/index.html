<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  html,body{margin:0;background:#0b0c0f;font-family:var(--font-body);color:var(--text-primary)}
  #root{min-height:100vh;display:flex;align-items:center;justify-content:center;gap:36px;padding:26px;flex-wrap:wrap}
  .cap{font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary);text-align:center;margin-top:10px}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="../shared/PhoneFrame.jsx"></script>
<script type="text/babel" src="LaunchScreen.jsx"></script>
<script type="text/babel" src="ConsentDialog.jsx"></script>
<script type="text/babel" src="AboutScreen.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [consent, setConsent] = useState(false);
  const [analytics, setAnalytics] = useState(true);
  const [crash, setCrash] = useState(true);
  const [view, setView] = useState('launch'); // launch | about (left phone)

  return (
    <>
      <div>
        <PhoneFrame bg="var(--bg-app)">
          {view === 'launch'
            ? <LaunchScreen onStart={() => setConsent(true)} />
            : <AboutScreen onBack={() => setView('launch')} analytics={analytics} setAnalytics={setAnalytics} crash={crash} setCrash={setCrash} />}
          <ConsentDialog
            open={consent}
            onAllow={() => { setAnalytics(true); setConsent(false); setView('about'); }}
            onDecline={() => { setAnalytics(false); setConsent(false); setView('about'); }}
          />
        </PhoneFrame>
        <div className="cap">{view === 'launch' ? 'Launch · tap “Start PvPeek” → consent' : 'About &amp; Legal · ← back to launch'}</div>
      </div>

      <div>
        <PhoneFrame bg="var(--bg-app)">
          <AboutScreen onBack={() => {}} analytics={analytics} setAnalytics={setAnalytics} crash={crash} setCrash={setCrash} />
        </PhoneFrame>
        <div className="cap">About &amp; Legal — disclaimer, data choices, licenses</div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
